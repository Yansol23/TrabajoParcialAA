services:
  docs:
    image: mi_proyecto_local_docs
    container_name: mi_proyecto_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./mi_proyecto:/app/mi_proyecto:z
    ports:
      - '9000:9000'
    command: /start-docs
